<!DOCTYPE html>
<html lang="id" style="">

<head>
    <meta charset="utf-8">

        rel="stylesheet">
    <link

        rel="stylesheet">

        rel="stylesheet">
    <style type="text/tailwindcss">
        @layer utilities {
            .shadow-ambient-tier-1 {
                box-shadow: inset 0 1px 0px 0px rgba(255, 255, 255, 0.4), 0 2px 8px -2px rgba(0, 0, 0, 0.05);
            }
            .shadow-ambient-tier-2 {
                box-shadow: inset 0 1px 0px 0px rgba(255, 255, 255, 0.6), 0 4px 20px rgba(0, 0, 0, 0.05), 0 2px 0px 0px rgba(216, 219, 215, 0.5);
            }
            .shadow-ambient-tier-3 {
                box-shadow: inset 0 1px 0px 0px rgba(255, 255, 255, 0.8), 0 12px 30px rgba(15, 82, 56, 0.2);
            }
            .shadow-glow-fruit {
                box-shadow: 0 0 20px rgba(255, 225, 109, 0.8), inset 0 -4px 10px rgba(0,0,0,0.2);
            }
            .text-shadow-glow {
                text-shadow: 0 2px 10px rgba(255, 225, 109, 0.6);
            }
            .glass-panel {
                background: rgba(248, 250, 246, 0.85);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.6);
            }
            .animate-float {
                animation: float 4s ease-in-out infinite;
            }
            .animate-pulse-glow {
                animation: pulseGlow 2s ease-in-out infinite alternate;
            }
            @keyframes float {
                0% { transform: translateY(0px); }
                50% { transform: translateY(-8px); }
                100% { transform: translateY(0px); }
            }
            @keyframes pulseGlow {
                0% { box-shadow: 0 0 10px rgba(255, 225, 109, 0.4), inset 0 -2px 5px rgba(0,0,0,0.1); }
                100% { box-shadow: 0 0 25px rgba(255, 225, 109, 0.9), inset 0 -4px 10px rgba(0,0,0,0.2); }
            }
        }
    </style>

<body
    class="bg-background text-on-background font-body-md min-h-screen overflow-x-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
    <!-- TopAppBar -->
    <header
        class="fixed top-0 right-0 w-full z-40 flex justify-between items-center px-gutter py-4 bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-md shadow-md md:pl-72 transition-all duration-300">
        <div class="flex items-center gap-4">
            <button class="md:hidden p-2 rounded-full hover:bg-surface-variant transition-colors">
                <span class="material-symbols-outlined text-primary">menu</span>
            </button>
            <h1
                class="font-headline-md text-headline-md font-extrabold text-primary dark:text-inverse-primary tracking-tight">
                Tree of Knowledge</h1>
        </div>
    </header>
    <!-- SideNavBar (Hidden on Mobile, Visible on MD+) -->
    <nav
        class="hidden md:flex flex-col h-screen w-72 fixed left-0 top-0 z-50 bg-surface-container dark:bg-surface-container-high border-r-2 border-primary-container shadow-xl p-md gap-base transition-all duration-300 shadow-md border-b-2 border-surface-dim">
        <!-- Header / Profile Area -->
        <div class="flex flex-col items-center p-4 mb-6 relative">
            <div
                class="w-24 h-24 rounded-full border-4 border-surface shadow-ambient-tier-2 overflow-hidden mb-4 relative z-10">
                <img alt="Learning Avatar" class="w-full h-full object-cover"
                    data-alt="A high-quality 3D rendered avatar of a young explorer kid, full face, smiling. The character has a vibrant, soft, tactile aesthetic similar to modern animated movies. The lighting is bright and cheerful, highlighting the adventurous spirit of the user profile. The background is a soft, blurred nature tone."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZQk2o-csa4z27yBp6IsK0xHu-P6GIRDsEb7OKwOUGKos7TVlBUUOSBvDB9QBDkQUAXY8cBvxoB1Pp_C1iL3tHgVCbj2Q4IgXODQNrF9ZrHgdDm-mw9uLI7nVipQLkph7dGzvAqkBts1SfsQx2Z_ueG5fir1RNKy0Jja69Lmb275wU74920Rrd8DvSSmDEqxdC6D-wC-bwTjWWoGk_6PGppI7saQMpk9mMSTfWum-UWGdmOq3zbbZJ">
            </div>
            <!-- Decorative leaf behind avatar -->
            <div
                class="absolute top-4 left-1/2 -translate-x-1/2 w-28 h-28 bg-primary-fixed rounded-full blur-2xl opacity-40 z-0">
            </div>
            <h2 class="font-headline-sm text-headline-sm font-bold text-primary text-center">Petualang Cilik</h2>
            <div
                class="flex items-center gap-1 mt-1 text-primary-container bg-primary-fixed/20 px-3 py-1 rounded-full text-label-sm font-label-sm">
                <span class="material-symbols-outlined text-[16px]"
                    style="font-variation-settings: 'FILL' 1;">star</span>
                Level 12 Penjelajah
            </div>
        </div>
        <!-- Navigation Links -->
        <ul class="flex flex-col gap-2 flex-grow">
            <!-- Active State -->
            <li class="">
                <a class="flex items-center gap-4 px-4 py-3 bg-secondary-container text-on-secondary-container font-bold rounded-xl shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)] transition-all duration-200 active:scale-95"
                    href="#">
                    <span class="material-symbols-outlined text-[24px]"
                        style="font-variation-settings: 'FILL' 1;">home</span>
                    <span class="font-label-md text-label-md">Beranda</span>
                </a>
            </li>
            <!-- Inactive States -->
            <li class="">
                <a class="flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:bg-primary-fixed-dim/20 rounded-xl hover:translate-x-1 transition-all duration-200 active:scale-95 group"
                    href="#">
                    <span
                        class="material-symbols-outlined text-[24px] group-hover:text-primary transition-colors">trending_up</span>
                    <span class="font-label-md text-label-md font-semibold">Progres</span>
                </a>
            </li>
            <li class="">
                <a class="flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:bg-primary-fixed-dim/20 rounded-xl hover:translate-x-1 transition-all duration-200 active:scale-95 group"
                    href="#">
                    <span
                        class="material-symbols-outlined text-[24px] group-hover:text-primary transition-colors">settings</span>
                    <span class="font-label-md text-label-md font-semibold">Pengaturan</span>
                </a>
            </li>
        </ul>
    </nav>
    <!-- Main Content Canvas -->
    <main class="md:ml-72 pt-0 min-h-screen relative overflow-hidden flex flex-col">
        <!-- Interactive Landscape Container -->
        <div class="relative w-full flex-grow flex items-center justify-center p-6 md:p-lg">
            <!-- Background Image Base (Full screen edge-to-edge) -->
            <div class="absolute inset-0 z-0 w-full h-full overflow-hidden">
                <img alt="Magical Tree of Knowledge Landscape" class="w-full h-full object-cover object-[65%_center]"
                    src="bg-center.png">
                <!-- Overlay Gradient for contrast -->
                <div
                    class="absolute inset-0 bg-gradient-to-t from-surface-tint/40 via-transparent to-surface/10 mix-blend-multiply pointer-events-none">
                </div>
            </div>

            <!-- Centered Subject Grid (Large Tactile Cards) -->
            <div class="relative z-10 w-full max-w-4xl flex flex-col items-center gap-8 pointer-events-none">
                <!-- Headline for the grid -->
                <h2 class="font-headline-xl text-3xl md:text-headline-xl text-white text-shadow-glow text-center font-extrabold tracking-tight drop-shadow-md">
                    Pilih Petualangan Belajarmu!
                </h2>

                    <!-- Card 1: Bahasa Indonesia -->

                        <!-- Fruit Image Container -->

                            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxG49dDS3v7NR_CgBOJpJcOyP0NfgHSQcR2_h2AMPYxNXqn8S1kzExgJQMFYCvGcDzjaxufTFt4LVxafZFFvufclCaYVE9-5GRYcTZThKNfWR6ZEwvnmYoLtkrBwYzgvgIDeBZlF7SIyVTqxKbOpsKZFeP_rtxMjll-A10lzhxkhzRwGfzKePkPVp80dLgeK81Z-nIMhcq35Hghqw8X-kLsQLmwgVO5qszr6YBTXVKJJZuyZXvPMjD"
                                alt="Orange" class="w-full h-full object-cover rounded-full">
                        </div>
                        <!-- Subject Title -->
                        <span class="mt-6 font-headline-md text-lg sm:text-headline-md text-primary dark:text-inverse-primary text-center font-bold tracking-tight">
                            Bahasa Indonesia
                        </span>
                        <!-- Play/Mulai Badge -->
                        <span class="mt-2 px-3 py-1 rounded-full bg-primary/10 text-primary dark:bg-inverse-primary/20 dark:text-inverse-primary text-label-sm font-semibold group-hover:bg-primary group-hover:text-white transition-all duration-300">
                            Mulai Belajar
                        </span>
                    </button>

                    <!-- Card 2: IPA -->
                    <button class="glass-panel w-48 h-64 sm:w-56 sm:h-76 rounded-[32px] p-6 flex flex-col items-center justify-center border-2 border-primary-container/20 hover:border-primary/40 hover:scale-105 active:scale-95 transition-all duration-300 pointer-events-auto cursor-pointer shadow-ambient-tier-2 hover:shadow-ambient-tier-3 group">
                        <!-- Fruit Image Container -->
                        <div class="w-24 h-24 sm:w-32 sm:h-32 bg-[#a8e7c5] rounded-full shadow-[0_0_20px_rgba(168,231,197,0.8),inset_0_-4px_10px_rgba(0,0,0,0.2)] flex items-center justify-center border-4 border-primary-container transition-transform duration-300 group-hover:rotate-12 group-active:scale-95 animate-float animate-pulse-glow" style="animation-delay: 0.5s;">
                            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDuqI9mXZyyTRjkQvs6PJoekHzZyb2OKRgNgUlY1IVcJvTiJEVHK2-nR6jLuPioWOyJ9iBZh8PeJz_hRXprBmjlsTSTSYlkKVzHTczObA6n7qg-UXROpRp2-sVsXUdPMOvqEVAFKjG88PvuSUGlkQkgOAjGMra9JD1ZwSZzQ_tVbnwWOa8gP4NJvEcetS7tqmxhbG32KdrbnxuKSmCZpT7GH_4DkmvUYAZyXO-cHfQ5ZjTrAfN9Vxcw"
                                alt="Pear" class="w-full h-full object-cover rounded-full">
                        </div>
                        <!-- Subject Title -->
                        <span class="mt-6 font-headline-md text-lg sm:text-headline-md text-primary dark:text-inverse-primary text-center font-bold tracking-tight">
                            IPA
                        </span>
                        <!-- Play/Mulai Badge -->
                        <span class="mt-2 px-3 py-1 rounded-full bg-primary/10 text-primary dark:bg-inverse-primary/20 dark:text-inverse-primary text-label-sm font-semibold group-hover:bg-primary group-hover:text-white transition-all duration-300">
                            Mulai Belajar
                        </span>
                    </button>

                    <!-- Card 3: Matematika -->
                    <button class="glass-panel w-48 h-64 sm:w-56 sm:h-76 rounded-[32px] p-6 flex flex-col items-center justify-center border-2 border-primary-container/20 hover:border-primary/40 hover:scale-105 active:scale-95 transition-all duration-300 pointer-events-auto cursor-pointer shadow-ambient-tier-2 hover:shadow-ambient-tier-3 group">
                        <!-- Fruit Image Container -->
                        <div class="w-24 h-24 sm:w-32 sm:h-32 bg-tertiary-fixed rounded-full shadow-[0_0_20px_rgba(179,235,255,0.8),inset_0_-4px_10px_rgba(0,0,0,0.2)] flex items-center justify-center border-4 border-tertiary-container transition-transform duration-300 group-hover:rotate-12 group-active:scale-95 animate-float animate-pulse-glow" style="animation-delay: 1s;">
                            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuABGfUwqL9wDWtQH-auSUnOe6GzPTfQV0SLLhl3uyv1nqDiCHzqU9q4RBvMyIiWR7baSPlGs4RxQf5QxiXiy8h_rHSTdUc1a3fMzuHne1Z4l9SQJwtaRE-MxIYup0gv9mTzKNcP_ehXCukJJBYXnAI9grtucHj_7ROfFcCa_L8wVQTCrTODLgnYQyrh8bdvr3gbdXt1nJZ2h4zyeLePBMV8sLcJB1lgmMRpiTuYSBxYwhR74bU4fR2_"
                                alt="Apple" class="w-full h-full object-cover rounded-full">
                        </div>
                        <!-- Subject Title -->
                        <span class="mt-6 font-headline-md text-lg sm:text-headline-md text-primary dark:text-inverse-primary text-center font-bold tracking-tight">
                            Matematika
                        </span>
                        <!-- Play/Mulai Badge -->
                        <span class="mt-2 px-3 py-1 rounded-full bg-primary/10 text-primary dark:bg-inverse-primary/20 dark:text-inverse-primary text-label-sm font-semibold group-hover:bg-primary group-hover:text-white transition-all duration-300">
                            Mulai Belajar
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </main>
